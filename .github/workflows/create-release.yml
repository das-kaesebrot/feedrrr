name: Generate release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: read

jobs:      
  release:
    runs-on: ubuntu-latest
    steps:
      - name: "Create release"
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          prerelease: true
          